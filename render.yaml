services:
  - type: web
    name: virtual-futbal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class gthread --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: virtual-futbal-db
          property: connectionString
      - key: FLASK_ENV
        value: production

databases:
  - name: virtual-futbal-db
    databaseName: virtual_futbal
    user: virtual_futbal_user
    plan: free
